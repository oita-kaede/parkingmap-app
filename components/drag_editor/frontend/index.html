<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', 'Hiragino Sans', sans-serif; background: transparent; overflow: hidden; }

  .editor-wrap { position: relative; display: inline-block; }
  .editor-wrap img { display: block; max-width: 100%; }

  /* Draggable elements */
  .overlay {
    position: absolute;
    cursor: move;
    border: 2px solid transparent;
    border-radius: 4px;
    z-index: 20;
    transition: border-color 0.1s;
    user-select: none;
  }
  .overlay:hover, .overlay.active {
    border-color: #FF6D00;
    box-shadow: 0 0 0 1px rgba(255,109,0,0.3);
  }

  /* Resize handles */
  .overlay .rh {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #FF6D00;
    border: 1.5px solid white;
    border-radius: 2px;
    display: none;
    z-index: 30;
  }
  .overlay:hover .rh, .overlay.active .rh { display: block; }
  .rh.tl { top: -5px; left: -5px; cursor: nw-resize; }
  .rh.tr { top: -5px; right: -5px; cursor: ne-resize; }
  .rh.bl { bottom: -5px; left: -5px; cursor: sw-resize; }
  .rh.br { bottom: -5px; right: -5px; cursor: se-resize; }

  /* Label style */
  .label-inner {
    background: #FFEB3B;
    border: 2px solid #F9A825;
    border-radius: 4px;
    font-weight: bold;
    text-align: center;
    white-space: nowrap;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 15px;
    transition: font-size 0.05s;
  }
  .pin-marker {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .pin-marker .pin-line { width: 2px; height: 10px; background: #FFD600; }
  .pin-marker .pin-dot { width: 10px; height: 10px; background: red; border: 2px solid darkred; border-radius: 50%; }

  /* Info box */
  .info-inner {
    background: rgba(255,255,255,0.92);
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.7;
    width: 100%;
    height: 100%;
    overflow: hidden;
    white-space: pre-line;
  }

  /* Layout image */
  .layout-inner {
    width: 100%;
    height: 100%;
    background: white;
    border: 3px solid white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .layout-inner img { width: 100%; height: 100%; object-fit: cover; }

  /* Confirm button */
  .confirm-bar {
    margin-top: 8px;
    text-align: center;
  }
  .confirm-btn {
    background: #FF6D00;
    color: white;
    border: none;
    padding: 8px 32px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  .confirm-btn:hover { background: #E65100; }

  .help-badge {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 12px;
    z-index: 50;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="editor-wrap" id="editor-wrap">
  <img id="bg-image" src="" />
  <div class="help-badge">ドラッグで移動 ／ 四隅■でリサイズ</div>
</div>
<div class="confirm-bar">
  <button class="confirm-btn" id="confirm-btn">✅ この配置で確定する</button>
</div>

<script>
/**
 * Inline Streamlit Component Library
 * CDN依存を排除してStreamlit Cloud互換性を確保
 */
(function() {
  // --- Streamlit Communication Layer ---
  var Streamlit = {
    RENDER_EVENT: "streamlit:render",
    _listeners: {},
    events: {
      _listeners: {},
      addEventListener: function(type, fn) {
        if (!this._listeners[type]) this._listeners[type] = [];
        this._listeners[type].push(fn);
      },
      dispatchEvent: function(event) {
        var fns = this._listeners[event.type] || [];
        for (var i = 0; i < fns.length; i++) fns[i](event);
      }
    },
    setComponentReady: function() {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:componentReady",
        apiVersion: 1
      }, "*");
    },
    setFrameHeight: function(height) {
      if (!height) {
        height = document.body.scrollHeight || 600;
      }
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: height
      }, "*");
    },
    setComponentValue: function(value) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentValue",
        value: value,
        dataType: "json"
      }, "*");
    }
  };

  // Listen for render messages from Streamlit
  window.addEventListener("message", function(event) {
    if (event.data && event.data.isStreamlitMessage) {
      if (event.data.type === "streamlit:render") {
        var renderEvent = new CustomEvent(Streamlit.RENDER_EVENT, { detail: event.data });
        Streamlit.events.dispatchEvent(renderEvent);
      }
    }
  });

  // --- Editor Logic ---
  var wrap = document.getElementById('editor-wrap');
  var bgImg = document.getElementById('bg-image');
  var confirmBtn = document.getElementById('confirm-btn');

  var overlayData = [];
  var overlayEls = {};
  var activeEl = null;
  var mode = null; // 'drag' | 'resize'
  var resizeDir = '';
  var startX, startY, startLeft, startTop, startW, startH;
  var initialized = false;

  function createOverlayEl(ov) {
    var el = document.createElement('div');
    el.className = 'overlay';
    el.id = ov.id;
    el.style.left = ov.x + 'px';
    el.style.top = ov.y + 'px';
    el.style.width = ov.w + 'px';
    el.style.height = ov.h + 'px';

    // Add resize handles
    ['tl','tr','bl','br'].forEach(function(dir) {
      var rh = document.createElement('div');
      rh.className = 'rh ' + dir;
      rh.dataset.dir = dir;
      el.appendChild(rh);
    });

    if (ov.type === 'label') {
      var inner = document.createElement('div');
      inner.className = 'label-inner';
      inner.textContent = ov.text || '';
      el.appendChild(inner);
      // Pin marker
      var marker = document.createElement('div');
      marker.className = 'pin-marker';
      marker.innerHTML = '<div class="pin-line"></div><div class="pin-dot"></div>';
      el.appendChild(marker);
    } else if (ov.type === 'info') {
      var inner2 = document.createElement('div');
      inner2.className = 'info-inner';
      inner2.textContent = ov.text || '';
      el.appendChild(inner2);
    } else if (ov.type === 'layout') {
      var inner3 = document.createElement('div');
      inner3.className = 'layout-inner';
      if (ov.image_base64) {
        var img = document.createElement('img');
        img.src = ov.image_base64;
        inner3.appendChild(img);
      } else {
        inner3.style.display = 'flex';
        inner3.style.alignItems = 'center';
        inner3.style.justifyContent = 'center';
        inner3.style.color = '#999';
        inner3.style.fontSize = '12px';
        inner3.textContent = '配置図';
      }
      el.appendChild(inner3);
    }

    // Event: drag start
    el.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('rh')) return;
      e.preventDefault();
      setActive(el);
      mode = 'drag';
      startX = e.clientX;
      startY = e.clientY;
      startLeft = el.offsetLeft;
      startTop = el.offsetTop;
    });

    // Event: resize start
    el.querySelectorAll('.rh').forEach(function(rh) {
      rh.addEventListener('mousedown', function(e) {
        e.preventDefault();
        e.stopPropagation();
        setActive(el);
        mode = 'resize';
        resizeDir = rh.dataset.dir;
        startX = e.clientX;
        startY = e.clientY;
        startLeft = el.offsetLeft;
        startTop = el.offsetTop;
        startW = el.offsetWidth;
        startH = el.offsetHeight;
      });
    });

    return el;
  }

  function setActive(el) {
    document.querySelectorAll('.overlay').forEach(function(o) { o.classList.remove('active'); });
    if (el) el.classList.add('active');
    activeEl = el;
  }

  document.addEventListener('mousemove', function(e) {
    if (!activeEl) return;
    e.preventDefault();
    var dx = e.clientX - startX;
    var dy = e.clientY - startY;
    var maxW = bgImg.offsetWidth;
    var maxH = bgImg.offsetHeight;

    if (mode === 'drag') {
      var nl = Math.max(0, Math.min(startLeft + dx, maxW - activeEl.offsetWidth));
      var nt = Math.max(0, Math.min(startTop + dy, maxH - activeEl.offsetHeight));
      activeEl.style.left = nl + 'px';
      activeEl.style.top = nt + 'px';
    } else if (mode === 'resize') {
      var nw = startW, nh = startH, nl2 = startLeft, nt2 = startTop;
      var minW = 40, minH = 20;
      if (resizeDir.includes('r')) nw = Math.max(minW, startW + dx);
      if (resizeDir.includes('l')) { nw = Math.max(minW, startW - dx); nl2 = startLeft + (startW - nw); }
      if (resizeDir.includes('b')) nh = Math.max(minH, startH + dy);
      if (resizeDir.includes('t')) { nh = Math.max(minH, startH - dy); nt2 = startTop + (startH - nh); }
      activeEl.style.width = nw + 'px';
      activeEl.style.height = nh + 'px';
      activeEl.style.left = nl2 + 'px';
      activeEl.style.top = nt2 + 'px';

      // ラベルの文字サイズをリサイズに連動
      var labelInner = activeEl.querySelector('.label-inner');
      if (labelInner) {
        var fontSize = Math.max(10, Math.min(48, nh * 0.55));
        labelInner.style.fontSize = fontSize + 'px';
      }
    }
  });

  document.addEventListener('mouseup', function() {
    mode = null;
  });

  // Confirm button
  confirmBtn.addEventListener('click', function() {
    var result = {};
    overlayData.forEach(function(ov) {
      var el = document.getElementById(ov.id);
      if (el) {
        result[ov.id] = {
          x: Math.round(el.offsetLeft),
          y: Math.round(el.offsetTop),
          w: Math.round(el.offsetWidth),
          h: Math.round(el.offsetHeight)
        };
      }
    });
    Streamlit.setComponentValue(result);
  });

  // Streamlit render
  function onRender(event) {
    var data = event.detail;
    var imgSrc = data.args.image_base64;
    var overlaysJson = data.args.overlays;

    overlayData = JSON.parse(overlaysJson);

    // Remove old overlays
    document.querySelectorAll('.overlay').forEach(function(el) { el.remove(); });

    // Set image and wait for it to load before creating overlays
    bgImg.onload = function() {
      // Create overlays after image is loaded
      overlayData.forEach(function(ov) {
        var el = createOverlayEl(ov);
        wrap.appendChild(el);
        overlayEls[ov.id] = el;
      });

      // Now that image is loaded, set frame height accurately
      Streamlit.setFrameHeight(bgImg.offsetHeight + 60);
    };

    bgImg.src = imgSrc;

    // Also set a minimum height immediately
    Streamlit.setFrameHeight(600);
  }

  Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
  Streamlit.setComponentReady();
  Streamlit.setFrameHeight(600);
})();
</script>
</body>
</html>
